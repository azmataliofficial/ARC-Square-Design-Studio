<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARC Square · dual‑motion loader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap"
        rel="stylesheet" />
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Edu+NSW+ACT+Cursive:wght@400..700&family=League+Spartan&family=Martel+Sans:wght@200;300;400;600;700;800;900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background-color: rgb(0, 0, 0);
        min-height: 100vh;
        font-family: Poppins;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem 2.5rem 2.5rem 2.5rem;
        background: transparent;
        animation: Fade 0.6s ease-out both;
    }

    .ringWrapper {
        position: relative;
        width: 100px;
        height: 100px;
        margin-top: 2rem;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .ringLoader {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        position: relative;
        border: 3px solid rgba(255, 255, 255, 0.03);
        border-bottom: 3px solid #f5c542;
        border-top: 3px solid #f5c542;
        animation: spinRing 1.8s linear infinite;
        animation-composition: add, add;
        box-shadow: 0 0 30px rgba(245, 197, 66, 0.05);
        z-index: 2;
    }

    .ringLoader::after {
        content: '';
        position: absolute;
        inset: 10px;
        border-radius: 50%;
        border: 3px solid rgba(245, 197, 66, 0.1);
        border-bottom: 3px solid #f5c542;
        border-top: 3px solid #f5c542;
        animation: spinRing 1.2s linear infinite;
    }

    .brand {
        font-size: 2rem;
        font-weight: 500;
        letter-spacing: 0.3px;
        color: #ffffff;
        opacity: 0.85;
    }

    .brand span {
        color: #f5c542;
        opacity: 0.5;
    }

    .sub {
        font-size: 1rem;
        font-weight: 400;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.5);
    }

    @keyframes spinRing {
        0% {
            transform: rotate(0deg);
        }
        50%{
            transform: rotate(180deg);
        }
         100% {
            transform: rotate(0deg);
        }
    }

    @keyframes Fade {
        0% {
            opacity: 0;
            transform: translateY(12px);
        }

        100% {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<body>
    <div class="loader">
        <div class="ringWrapper">
            <div class="ringLoader"></div>
        </div>
        <div class="brand"><span>ARC</span> SQUARE</div>
        <div class="sub">Design <span>Studio</span></div>
    </div>
</body>

</html>

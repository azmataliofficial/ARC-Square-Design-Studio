<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARC Square · Design Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
            background: #f5f3f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container1 {
            max-width: auto;
            margin: 2rem;
            padding: 3rem 2.5rem;
            background: #ffffff;
            border-radius: 2.5rem;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
        }

        .about-sec {
            display: flex;
            justify-content: center;
        }

        .content {
            text-align: center;
        }

        .content h2 {
            font-size: 4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #1e1e1e;
            opacity: 0;
            transform: translateY(18px);
            animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.05s;
            margin-bottom: 0.2rem;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(18px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subtitle-static {
            display: block;
            font-size: 1.9rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            color: #3a3a3a;
            margin-top: 0.15rem;
            margin-bottom: 0.75rem;
        }

        .typing-wrapper {
            min-height: 4.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 0.3rem;
        }

        .typing-paragraph {
            font-size: 1.3rem;
            color: #4a4a4a;
            line-height: 1.6;
            display: inline-block;
            white-space: nowrap;
            border-right: 2px solid #1e1e1e;
            padding-right: 6px;
            animation: blinkCaret 0.75s step-end infinite;
            opacity: 0;
            transition: opacity 0.1s;
        }

        .typing-paragraph.visible {
            opacity: 1;
        }
    </style>
</head>

<body>

    <section class="about-sec slide-sec" id="about">
        <div class="container1">
            <div class="content">
                <h2>ARC Square</h2>

                <span class="subtitle-static">Design Studio</span>

                <div class="typing-wrapper">
                    <p class="typing-paragraph" id="typeParagraph">
                        Crafting exceptional spaces through innovative design and architectural excellence.
                    </p>
                </div>
            </div>
        </div>
    </section>

    <script>
        const paragraph = document.getElementById('typeParagraph');
        const fullText = paragraph.textContent.trim();

        paragraph.textContent = '';
        paragraph.classList.remove('done');

        let charIndex = 0;
        let timer = null;

        const headingDelay = 750;

        function typeNextChar() {
            if (charIndex >= fullText.length) {
                paragraph.classList.add('done');
                paragraph.style.borderRight = 'none';
                clearTimeout(timer);
                return;
            }

            paragraph.textContent = fullText.substring(0, charIndex + 1);
            charIndex++;

            timer = setTimeout(typeNextChar, 55);
        }

        setTimeout(() => {
            paragraph.classList.add('visible');
            typeNextChar();
        }, headingDelay);
    </script>
</body>

</html>
